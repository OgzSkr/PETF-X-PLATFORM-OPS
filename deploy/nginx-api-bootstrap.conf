# Geçici HTTP — certbot sonrası deploy/nginx-api.petfix.com.tr.conf devreye girer
upstream petfix_ops_app {
    server 127.0.0.1:8787;
    keepalive 32;
}

server {
    listen 80 default_server;
    server_name api.petfix.com.tr _;

    client_max_body_size 8m;

    location / {
        proxy_pass http://petfix_ops_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Webhook-Secret $http_x_webhook_secret;
        proxy_set_header X-Petfix-Webhook-Secret $http_x_petfix_webhook_secret;
        proxy_set_header X-Api-Key $http_x_api_key;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }
}
